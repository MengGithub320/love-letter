<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="母亲节快乐，给妈妈的一封手写家书">
    <title>母亲节快乐</title>

    <meta property="og:title" content="母亲节快乐">
    <meta property="og:description" content="展开一封写给妈妈的家书">
    <meta property="og:image" content="https://mmbiz.qpic.cn/mmbiz_png/lC4pRubianpicD7GiciaibDvic8YQ/0">
    <meta property="og:url" content="">
    <meta property="og:type" content="website">

    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            background:
                linear-gradient(90deg, rgba(180, 132, 88, 0.08) 1px, transparent 1px),
                linear-gradient(180deg, rgba(180, 132, 88, 0.08) 1px, transparent 1px),
                #f7eee2;
            background-size: 36px 36px;
            color: #3f2c2a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        }

        .stage {
            position: relative;
            width: min(100vw, 460px);
            height: min(100vh, 820px);
            height: min(100dvh, 820px);
            min-height: min(680px, 100vh);
            min-height: min(680px, 100dvh);
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 12%, rgba(255, 193, 186, 0.32), transparent 28%),
                radial-gradient(circle at 88% 86%, rgba(224, 180, 120, 0.28), transparent 28%),
                linear-gradient(180deg, #fffaf3 0%, #f8ebdd 58%, #f0ddca 100%);
            box-shadow: 0 0 52px rgba(110, 68, 43, 0.12);
        }

        .stage::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(118deg, transparent 0 42%, rgba(133, 85, 48, 0.06) 43% 44%, transparent 45%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.36), transparent 32%);
            pointer-events: none;
        }

        .theme-title {
            position: absolute;
            left: 50%;
            top: max(28px, env(safe-area-inset-top));
            z-index: 20;
            width: min(330px, calc(100% - 52px));
            padding: 17px 18px 15px;
            border: 2px solid rgba(117, 70, 54, 0.34);
            border-radius: 18px;
            background: rgba(255, 249, 240, 0.84);
            color: #b85055;
            box-shadow: 0 12px 0 rgba(185, 116, 86, 0.12), 0 20px 42px rgba(111, 74, 52, 0.14);
            cursor: pointer;
            text-align: center;
            transform: translateX(-50%) rotate(-1.2deg);
            user-select: none;
            font-family: "Bradley Hand", "Comic Sans MS", "PingFang SC", cursive;
            font-size: clamp(34px, 9.8vw, 50px);
            font-weight: 900;
            line-height: 1.04;
            letter-spacing: 0;
        }

        .theme-title:focus-visible {
            outline: 4px solid rgba(203, 111, 91, 0.42);
            outline-offset: 8px;
        }

        .theme-title::before,
        .theme-title::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            background: rgba(218, 114, 111, 0.78);
        }

        .theme-title::before {
            left: 18px;
            top: 16px;
            width: 9px;
            height: 9px;
            box-shadow: 274px 48px 0 rgba(218, 114, 111, 0.52);
        }

        .theme-title::after {
            right: 26px;
            top: -8px;
            width: 48px;
            height: 18px;
            border: 1px solid rgba(117, 70, 54, 0.28);
            background: rgba(255, 225, 183, 0.86);
            transform: rotate(7deg);
        }

        .letter-scene {
            position: absolute;
            inset: 0;
            z-index: 4;
        }

        .paper-letter {
            position: absolute;
            left: 50%;
            top: 188px;
            z-index: 8;
            width: min(338px, calc(100% - 54px));
            min-height: 330px;
            padding: 34px 28px 28px;
            border: 1px solid rgba(126, 82, 60, 0.22);
            border-radius: 8px;
            background:
                linear-gradient(transparent 35px, rgba(198, 123, 105, 0.18) 36px, transparent 37px),
                linear-gradient(90deg, rgba(190, 91, 82, 0.18) 0 1px, transparent 1px),
                #fffaf0;
            background-size: 100% 38px, 36px 100%, 100% 100%;
            box-shadow: 0 20px 38px rgba(96, 63, 45, 0.18), inset 0 0 34px rgba(238, 202, 166, 0.28);
            opacity: 0;
            transform: translate(-50%, 92px) rotateX(52deg) rotate(-4deg) scale(0.82);
            transform-origin: center top;
            animation-fill-mode: forwards;
        }

        .paper-letter::before {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 86px;
            height: 1px;
            background: rgba(201, 126, 108, 0.22);
            box-shadow: 0 76px 0 rgba(201, 126, 108, 0.18), 0 152px 0 rgba(201, 126, 108, 0.14);
        }

        .paper-letter::after {
            content: "";
            position: absolute;
            right: 18px;
            bottom: 18px;
            width: 62px;
            height: 42px;
            border: 1px solid rgba(168, 91, 78, 0.34);
            border-radius: 50%;
            opacity: 0.55;
            transform: rotate(-12deg);
        }

        .is-started .paper-letter {
            animation: letter-unfold 1.18s cubic-bezier(.18, .76, .22, 1.08) 0.18s forwards, paper-breathe 5.6s ease-in-out 1.5s infinite;
        }

        .letter-kicker {
            color: #9a6b59;
            font-size: 15px;
            font-weight: 700;
        }

        .letter-line {
            position: relative;
            z-index: 2;
            margin-top: 22px;
            color: #8d4b49;
            font-family: "Bradley Hand", "Comic Sans MS", "PingFang SC", cursive;
            font-size: clamp(25px, 6.8vw, 34px);
            font-weight: 900;
            line-height: 1.34;
        }

        .letter-sign {
            position: relative;
            z-index: 2;
            margin-top: 28px;
            color: #6d554c;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.62;
        }

        .letter-sign strong {
            display: block;
            color: #bc585f;
            font-family: "Bradley Hand", "Comic Sans MS", "PingFang SC", cursive;
            font-size: 26px;
            line-height: 1.2;
        }

        .envelope-flap {
            position: absolute;
            left: 50%;
            top: 546px;
            z-index: 6;
            width: 236px;
            height: 128px;
            border: 1px solid rgba(119, 77, 55, 0.24);
            border-radius: 6px;
            background: linear-gradient(145deg, #eec9a7, #f8ddbe);
            box-shadow: 0 18px 30px rgba(100, 67, 47, 0.16);
            opacity: 0;
            transform: translate(-50%, 86px) rotate(3deg);
            animation-fill-mode: forwards;
        }

        .envelope-flap::before,
        .envelope-flap::after {
            content: "";
            position: absolute;
            inset: 0;
            clip-path: polygon(0 0, 50% 58%, 100% 0, 100% 100%, 0 100%);
            background: linear-gradient(180deg, rgba(255, 251, 239, 0.38), rgba(188, 119, 85, 0.12));
        }

        .envelope-flap::after {
            clip-path: polygon(0 100%, 50% 44%, 100% 100%);
            background: rgba(190, 111, 80, 0.18);
        }

        .keepsake {
            position: absolute;
            z-index: 10;
            opacity: 0;
            transform: translate(var(--from-x), var(--from-y)) rotate(var(--from-rotate, 0deg)) scale(0.82);
            animation-fill-mode: forwards;
            will-change: transform, opacity;
        }

        .is-started .keepsake {
            animation: keepsake-arrive 0.86s cubic-bezier(.18, .78, .24, 1.12) var(--delay, 0s) forwards;
        }

        .is-started .envelope-flap {
            animation: keepsake-arrive 0.9s cubic-bezier(.18, .78, .24, 1.12) 0.05s forwards;
        }

        .photo-corner {
            width: 104px;
            height: 84px;
            border: 8px solid #fff8ed;
            background: linear-gradient(135deg, #d8b491, #f3dac0 58%, #c98f87);
            box-shadow: 0 10px 22px rgba(96, 63, 45, 0.18);
        }

        .photo-corner::before,
        .photo-corner::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 14px;
            background: rgba(255, 239, 199, 0.8);
            transform: rotate(-18deg);
        }

        .photo-corner::before { left: -14px; top: -14px; }
        .photo-corner::after { right: -14px; bottom: -12px; }

        .photo-corner.one {
            left: 30px;
            top: 156px;
            --from-x: -170px;
            --from-y: -90px;
            --from-rotate: -18deg;
            --to-rotate: -9deg;
            --delay: .36s;
        }

        .photo-corner.two {
            right: 32px;
            bottom: 122px;
            width: 92px;
            height: 74px;
            --from-x: 170px;
            --from-y: 110px;
            --from-rotate: 22deg;
            --to-rotate: 8deg;
            --delay: .7s;
        }

        .sticky-note {
            left: 36px;
            bottom: 154px;
            width: 122px;
            min-height: 92px;
            padding: 20px 12px 12px;
            border-radius: 6px;
            background: #fff0a8;
            color: #8d6343;
            box-shadow: 0 12px 22px rgba(96, 63, 45, 0.16);
            font-size: 17px;
            font-weight: 900;
            line-height: 1.32;
            text-align: center;
            --from-x: -180px;
            --from-y: 80px;
            --from-rotate: -18deg;
            --to-rotate: 5deg;
            --delay: .82s;
        }

        .sticky-note::before {
            content: "";
            position: absolute;
            left: 34px;
            top: -10px;
            width: 48px;
            height: 18px;
            border-radius: 3px;
            background: rgba(255, 218, 166, 0.86);
            transform: rotate(-4deg);
        }

        .stamp {
            right: 42px;
            top: 178px;
            width: 74px;
            height: 88px;
            display: grid;
            place-items: center;
            border: 2px dashed #b96565;
            background: #fff4ef;
            color: #b45157;
            font-size: 15px;
            font-weight: 900;
            text-align: center;
            line-height: 1.18;
            --from-x: 150px;
            --from-y: -110px;
            --from-rotate: 16deg;
            --to-rotate: 7deg;
            --delay: .48s;
        }

        .pressed-flower {
            right: 40px;
            top: 306px;
            width: 62px;
            height: 142px;
            --from-x: 180px;
            --from-y: 10px;
            --from-rotate: 24deg;
            --to-rotate: -10deg;
            --delay: .92s;
        }

        .pressed-flower::before {
            content: "";
            position: absolute;
            left: 29px;
            top: 28px;
            width: 5px;
            height: 110px;
            border-radius: 999px;
            background: #79935e;
        }

        .pressed-flower::after {
            content: "";
            position: absolute;
            left: 10px;
            top: 0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 50%, #c95762 0 18%, transparent 19%),
                radial-gradient(circle at 50% 0, #e8a0a0 0 30%, transparent 31%),
                radial-gradient(circle at 100% 50%, #e8a0a0 0 30%, transparent 31%),
                radial-gradient(circle at 50% 100%, #e8a0a0 0 30%, transparent 31%),
                radial-gradient(circle at 0 50%, #e8a0a0 0 30%, transparent 31%);
            filter: drop-shadow(0 4px 0 rgba(126, 82, 60, 0.12));
        }

        .petal {
            width: 22px;
            height: 34px;
            border-radius: 70% 30% 70% 30%;
            background: #d86f73;
            box-shadow: inset 6px 6px 0 rgba(255, 255, 255, 0.22);
        }

        .petal.one {
            left: 76px;
            top: 306px;
            --from-x: -120px;
            --from-y: -80px;
            --from-rotate: -40deg;
            --to-rotate: 28deg;
            --delay: 1.02s;
        }

        .petal.two {
            right: 108px;
            top: 520px;
            background: #e7a37c;
            --from-x: 140px;
            --from-y: 90px;
            --from-rotate: 48deg;
            --to-rotate: -24deg;
            --delay: 1.08s;
        }

        .petal.three {
            left: 186px;
            bottom: 70px;
            width: 18px;
            height: 28px;
            background: #d65567;
            --from-x: 20px;
            --from-y: 160px;
            --from-rotate: 80deg;
            --to-rotate: 18deg;
            --delay: 1.14s;
        }

        .is-started .petal {
            animation:
                keepsake-arrive 0.86s cubic-bezier(.18, .78, .24, 1.12) var(--delay, 0s) forwards,
                petal-drift 4.8s ease-in-out calc(var(--delay, 0s) + 1s) infinite;
        }

        @keyframes letter-unfold {
            0% {
                opacity: 0;
                transform: translate(-50%, 92px) rotateX(52deg) rotate(-4deg) scale(0.82);
                filter: blur(1px);
            }
            62% {
                opacity: 1;
                transform: translate(-50%, -4px) rotateX(0deg) rotate(1.2deg) scale(1.03);
                filter: blur(0);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, 0) rotateX(0deg) rotate(-1.4deg) scale(1);
                filter: blur(0);
            }
        }

        @keyframes keepsake-arrive {
            0% {
                opacity: 0;
                transform: translate(var(--from-x), var(--from-y)) rotate(var(--from-rotate, 0deg)) scale(0.82);
                filter: blur(1px);
            }
            76% {
                opacity: 1;
                transform: translate(0, 0) rotate(var(--to-rotate, 0deg)) scale(1.04);
                filter: blur(0);
            }
            100% {
                opacity: 1;
                transform: translate(0, 0) rotate(var(--to-rotate, 0deg)) scale(1);
                filter: blur(0);
            }
        }

        @keyframes paper-breathe {
            0%, 100% { translate: 0 0; }
            50% { translate: 0 -4px; }
        }

        @keyframes petal-drift {
            0%, 100% { translate: 0 0; }
            50% { translate: 4px -7px; }
        }

        .message-modal {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(72, 48, 40, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.34s ease;
        }

        .message-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .message-dialog {
            width: min(342px, 100%);
            padding: 28px 24px 22px;
            border: 1px solid rgba(126, 82, 60, 0.25);
            border-radius: 14px;
            background: #fffaf0;
            box-shadow: 0 18px 0 rgba(181, 105, 91, 0.14), 0 30px 70px rgba(72, 48, 40, 0.26);
            text-align: center;
            transform: translateY(18px) scale(0.94);
            transition: transform 0.42s cubic-bezier(.18, .88, .24, 1.15);
        }

        .message-modal.active .message-dialog {
            transform: translateY(0) scale(1);
        }

        .message-dialog h2 {
            margin-bottom: 12px;
            color: #b85055;
            font-family: "Bradley Hand", "Comic Sans MS", "PingFang SC", cursive;
            font-size: 28px;
            line-height: 1.18;
        }

        .message-dialog p {
            color: #5d4941;
            font-size: 17px;
            font-weight: 700;
            line-height: 1.75;
        }

        .message-dialog button {
            min-width: 132px;
            min-height: 44px;
            margin-top: 18px;
            border: 0;
            border-radius: 999px;
            background: #b85055;
            color: #fffaf0;
            box-shadow: 0 7px 0 #8d4b49;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .stage {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                min-height: min(640px, 100vh);
                min-height: min(640px, 100dvh);
            }

            .theme-title {
                top: max(24px, env(safe-area-inset-top));
                width: min(306px, calc(100% - 44px));
                font-size: clamp(32px, 9.6vw, 44px);
            }

            .paper-letter {
                top: 176px;
                width: min(318px, calc(100% - 44px));
                min-height: 316px;
                padding: 30px 23px 24px;
            }

            .letter-line {
                font-size: clamp(24px, 6.8vw, 30px);
            }

            .envelope-flap {
                top: 524px;
                width: 210px;
                height: 116px;
            }

            .photo-corner.one { left: 18px; top: 144px; transform: scale(0.86); }
            .photo-corner.two { right: 20px; bottom: 104px; transform: scale(0.86); }
            .sticky-note { left: 22px; bottom: 138px; width: 108px; font-size: 15px; }
            .stamp { right: 26px; top: 166px; width: 66px; height: 78px; font-size: 13px; }
            .pressed-flower { right: 26px; top: 304px; transform: scale(0.9); }
            .petal.one { left: 58px; top: 300px; }
            .petal.two { right: 90px; top: 502px; }

            .message-dialog {
                width: min(326px, 100%);
                padding: 25px 20px 21px;
            }

            .message-dialog p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="stage" id="stage">
        <h1 role="button" class="theme-title" id="themeTitle" tabindex="0" aria-label="重新播放母亲节家书动画">母亲节快乐</h1>

        <section class="letter-scene" aria-label="写给妈妈的手写家书">
            <div class="envelope-flap" aria-hidden="true"></div>

            <article class="paper-letter">
                <p class="letter-kicker">To 妈妈</p>
                <p class="letter-line">妈妈，今天想把平常没说出口的话，认真写给您。</p>
                <p class="letter-sign">
                    愿今天的风慢一点，花香久一点。
                    <strong>爱您的我</strong>
                </p>
            </article>

            <div class="keepsake photo-corner one" aria-hidden="true"></div>
            <div class="keepsake photo-corner two" aria-hidden="true"></div>
            <div class="keepsake sticky-note">谢谢您<br>一直在</div>
            <div class="keepsake stamp">Mother's<br>Day</div>
            <div class="keepsake pressed-flower" aria-hidden="true"></div>
            <div class="keepsake petal one" aria-hidden="true"></div>
            <div class="keepsake petal two" aria-hidden="true"></div>
            <div class="keepsake petal three" aria-hidden="true"></div>
        </section>
    </main>

    <div class="message-modal" id="messageModal" aria-hidden="true">
        <div class="message-dialog" role="dialog" aria-modal="true" aria-labelledby="messageTitle">
            <h2 id="messageTitle">写给妈妈</h2>
            <p>妈妈，谢谢您把日子过成温柔的家。愿您每天都轻松一点、开心一点，被爱包围，也被岁月温柔以待。母亲节快乐，我永远爱您。</p>
            <button type="button" id="closeMessage">收下这封信</button>
        </div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const themeTitle = document.getElementById('themeTitle');
        const messageModal = document.getElementById('messageModal');
        const closeMessage = document.getElementById('closeMessage');
        const animatedKeepsakes = Array.from(document.querySelectorAll('.keepsake'));
        const paperLetter = document.querySelector('.paper-letter');
        const totalAnimationPieces = animatedKeepsakes.length + 1;
        let finishedKeepsakeCount = 0;
        let modalTimer = null;

        function closeMessageModal() {
            messageModal.classList.remove('active');
            messageModal.setAttribute('aria-hidden', 'true');
        }

        function openMessageModal() {
            messageModal.classList.add('active');
            messageModal.setAttribute('aria-hidden', 'false');
        }

        function startLetterAnimation() {
            closeMessageModal();
            window.clearTimeout(modalTimer);
            finishedKeepsakeCount = 0;
            stage.classList.remove('is-started');
            void stage.offsetWidth;
            stage.classList.add('is-started');
        }

        function handleAnimationEnd(event) {
            if (event.animationName !== 'keepsake-arrive' && event.animationName !== 'letter-unfold') {
                return;
            }

            finishedKeepsakeCount += 1;

            if (finishedKeepsakeCount >= totalAnimationPieces) {
                window.clearTimeout(modalTimer);
                modalTimer = window.setTimeout(openMessageModal, 360);
            }
        }

        paperLetter.addEventListener('animationend', handleAnimationEnd);
        animatedKeepsakes.forEach((keepsake) => {
            keepsake.addEventListener('animationend', handleAnimationEnd);
        });

        themeTitle.addEventListener('click', startLetterAnimation);
        themeTitle.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                startLetterAnimation();
            }
        });
        closeMessage.addEventListener('click', closeMessageModal);
        messageModal.addEventListener('click', (event) => {
            if (event.target === messageModal) {
                closeMessageModal();
            }
        });
        window.addEventListener('load', () => {
            startLetterAnimation();
        });
    </script>
</body>
</html>
