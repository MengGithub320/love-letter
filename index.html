<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="一封充满爱心的代码情书">
    <title>💌 给你的代码情书</title>

    <!-- 微信分享meta标签 -->
    <meta property="og:title" content="💌 给你的代码情书">
    <meta property="og:description" content="编译通过，运行结果：永远爱你 💕">
    <meta property="og:image" content="https://mmbiz.qpic.cn/mmbiz_png/lC4pRubianpicD7GiciaibDvic8YQ/0">
    <meta property="og:url" content="">
    <meta property="og:type" content="website">

    <!-- 微信jssdk需要 -->
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #fff5f5;
        }

        #version-frame {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .switch-title {
            position: fixed;
            left: 0;
            top: 28vh;
            z-index: 10;
            display: grid;
            place-items: center;
            width: 96px;
            height: 58px;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: grab;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .switch-title::before {
            content: "";
            position: absolute;
            inset: -9px -12px -10px -12px;
            pointer-events: none;
            background-image: url('assets/version-switch-branch.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform-origin: center;
        }

        .switch-title[data-edge="left"]::before {
            transform: rotate(0deg);
        }

        .switch-title[data-edge="right"]::before {
            transform: scaleX(-1);
        }

        .switch-title[data-edge="top"]::before {
            transform: rotate(90deg);
        }

        .switch-title[data-edge="bottom"]::before {
            transform: rotate(-90deg);
        }

        .switch-title.is-snapping {
            transition: left 220ms ease, top 220ms ease;
        }

        .version-modal {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(45, 19, 44, 0.42);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 220ms ease, visibility 220ms ease;
        }

        .version-modal.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .version-modal.is-hiding {
            opacity: 0;
            pointer-events: none;
        }

        .version-dialog {
            width: min(320px, 100%);
            padding: 24px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
            text-align: center;
        }

        .version-dialog h2 {
            margin: 0 0 16px;
            color: #ee5a6f;
            font: 800 20px/1.3 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
        }

        .version-actions {
            display: grid;
            gap: 10px;
        }

        .version-option,
        .version-close {
            min-height: 42px;
            border: 0;
            border-radius: 999px;
            font: 700 14px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            cursor: pointer;
        }

        .version-option {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }

        .version-option.active {
            box-shadow: 0 0 0 3px rgba(254, 202, 87, 0.42);
            background: linear-gradient(135deg, #feca57 0%, #ee5a6f 100%);
        }

        .version-close {
            margin-top: 12px;
            background: #fff5f5;
            color: #ee5a6f;
        }
    </style>
</head>
<body>
    <button class="switch-title" id="switch-title" type="button"></button>
    <iframe id="version-frame" title="给你的代码情书"></iframe>

    <div class="version-modal" id="version-modal" aria-hidden="true">
        <div class="version-dialog" role="dialog" aria-modal="true" aria-labelledby="version-modal-title">
            <h2 id="version-modal-title">切换版本</h2>
            <div class="version-actions" id="version-actions"></div>
            <button class="version-close" type="button" id="version-close">关闭</button>
        </div>
    </div>

    <script>
        const versionFrame = document.getElementById('version-frame');
        const switchTitle = document.getElementById('switch-title');
        const versionModal = document.getElementById('version-modal');
        const versionActions = document.getElementById('version-actions');
        const versionClose = document.getElementById('version-close');
        const SWITCH_POSITION_KEY = 'loveLetterVersionSwitchPosition';
        const SWITCH_MARGIN = 0;
        const SWITCH_DRAG_THRESHOLD = 6;
        const SWITCH_DEFAULT_TOP_RATIO = 0.28;
        const SWITCH_EDGE_ANIMATION_DURATION = 220;
        const MODAL_FADE_DURATION = 240;
        let allVersions = [];
        let currentVersion = null;
        let switchDragState = null;
        let switchPosition = null;
        let suppressNextSwitchClick = false;
        let modalCloseTimer = null;

        function switchVersion(version) {
            currentVersion = version;
            versionFrame.src = version.file;
            versionFrame.title = version.name;
            switchTitle.textContent = '';
            switchTitle.title = version.name;
            switchTitle.setAttribute('aria-label', `切换版本：${version.name}`);
            renderVersionButtons(allVersions);
            closeVersionModal();
        }

        function renderVersionButtons(versions) {
            versionActions.innerHTML = '';

            versions.forEach((version) => {
                const button = document.createElement('button');
                const isActive = currentVersion && currentVersion.file === version.file;
                button.className = isActive ? 'version-option active' : 'version-option';
                button.type = 'button';
                button.textContent = version.name;
                button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
                button.addEventListener('click', () => switchVersion(version));
                versionActions.appendChild(button);
            });
        }

        function openVersionModal() {
            if (modalCloseTimer) {
                clearTimeout(modalCloseTimer);
                modalCloseTimer = null;
            }

            versionModal.classList.remove('is-hiding');
            versionModal.classList.add('show');
            versionModal.setAttribute('aria-hidden', 'false');
        }

        function resetVersionModalState() {
            suppressNextSwitchClick = false;
        }

        function finishVersionModalClose() {
            versionModal.classList.remove('show', 'is-hiding');
            versionModal.setAttribute('aria-hidden', 'true');
            resetVersionModalState();
            modalCloseTimer = null;
        }

        function closeVersionModal() {
            if (!versionModal.classList.contains('show')) {
                finishVersionModalClose();
                return;
            }

            versionModal.classList.add('is-hiding');
            modalCloseTimer = setTimeout(finishVersionModalClose, MODAL_FADE_DURATION);
        }

        function loadRandomVersion(versions) {
            const randomIndex = Math.floor(Math.random() * versions.length);
            const selectedVersion = versions[randomIndex];
            switchVersion(selectedVersion);
        }

        function getRequestedVersion(versions) {
            const params = new URLSearchParams(window.location.search);
            const requestedFile = params.get('version');

            if (!requestedFile) {
                return null;
            }

            return versions.find((version) => version.file === requestedFile || version.name === requestedFile) || null;
        }

        function constrainSwitchPosition(left, top) {
            const rect = switchTitle.getBoundingClientRect();
            const buttonWidth = rect.width || 96;
            const buttonHeight = rect.height || 58;
            const maxLeft = Math.max(SWITCH_MARGIN, window.innerWidth - buttonWidth - SWITCH_MARGIN);
            const maxTop = Math.max(SWITCH_MARGIN, window.innerHeight - buttonHeight - SWITCH_MARGIN);

            return {
                left: Math.min(Math.max(left, SWITCH_MARGIN), maxLeft),
                top: Math.min(Math.max(top, SWITCH_MARGIN), maxTop)
            };
        }

        function getSwitchEdgeDirection(position) {
            const rect = switchTitle.getBoundingClientRect();
            const buttonWidth = rect.width || 96;
            const buttonHeight = rect.height || 58;
            const centerX = position.left + buttonWidth / 2;
            const centerY = position.top + buttonHeight / 2;
            const distanceLeft = centerX;
            const distanceRight = Math.max(0, window.innerWidth - centerX);
            const distanceTop = centerY;
            const distanceBottom = Math.max(0, window.innerHeight - centerY);
            const distances = [
                ['left', distanceLeft],
                ['right', distanceRight],
                ['top', distanceTop],
                ['bottom', distanceBottom]
            ];

            return distances.reduce((nearest, next) => (
                next[1] < nearest[1] ? next : nearest
            ))[0];
        }

        function applySwitchDirection(direction) {
            switchTitle.dataset.edge = direction;
        }

        function getSwitchEdgePosition(position) {
            const constrainedPosition = constrainSwitchPosition(position.left, position.top);
            const rect = switchTitle.getBoundingClientRect();
            const buttonWidth = rect.width || 96;
            const buttonHeight = rect.height || 58;
            const direction = getSwitchEdgeDirection(constrainedPosition);

            switch (direction) {
                case 'left':
                    return {
                        left: SWITCH_MARGIN,
                        top: constrainedPosition.top
                    };
                case 'right':
                    return {
                        left: Math.max(SWITCH_MARGIN, window.innerWidth - buttonWidth - SWITCH_MARGIN),
                        top: constrainedPosition.top
                    };
                case 'top':
                    return {
                        left: constrainedPosition.left,
                        top: SWITCH_MARGIN
                    };
                case 'bottom':
                    return {
                        left: constrainedPosition.left,
                        top: Math.max(SWITCH_MARGIN, window.innerHeight - buttonHeight - SWITCH_MARGIN)
                    };
                default:
                    return constrainedPosition;
            }
        }

        function applySwitchPosition(position) {
            const nextPosition = constrainSwitchPosition(position.left, position.top);
            switchPosition = nextPosition;
            switchTitle.style.left = `${nextPosition.left}px`;
            switchTitle.style.top = `${nextPosition.top}px`;
            switchTitle.style.right = 'auto';
            switchTitle.style.bottom = 'auto';
            applySwitchDirection(getSwitchEdgeDirection(nextPosition));

            return nextPosition;
        }

        function saveSwitchPosition(position) {
            try {
                localStorage.setItem(SWITCH_POSITION_KEY, JSON.stringify(position));
            } catch (error) {
                // Some embedded browsers block storage; dragging should still work for this session.
            }
        }

        function getDefaultSwitchPosition() {
            return getSwitchEdgePosition(constrainSwitchPosition(0, window.innerHeight * SWITCH_DEFAULT_TOP_RATIO));
        }

        function animateSwitchToEdge(position) {
            const edgePosition = getSwitchEdgePosition(position);

            switchTitle.classList.add('is-snapping');
            applySwitchPosition(edgePosition);

            setTimeout(() => {
                switchTitle.classList.remove('is-snapping');
                saveSwitchPosition(edgePosition);
            }, SWITCH_EDGE_ANIMATION_DURATION);

            return edgePosition;
        }

        function restoreSwitchPosition() {
            try {
                const storedPosition = localStorage.getItem(SWITCH_POSITION_KEY);

                if (!storedPosition) {
                    applySwitchPosition(getDefaultSwitchPosition());
                    return;
                }

                const parsedPosition = JSON.parse(storedPosition);
                const hasValidPosition = Number.isFinite(parsedPosition.left) && Number.isFinite(parsedPosition.top);

                if (hasValidPosition) {
                    const edgePosition = getSwitchEdgePosition(parsedPosition);
                    applySwitchPosition(edgePosition);
                    saveSwitchPosition(edgePosition);
                } else {
                    applySwitchPosition(getDefaultSwitchPosition());
                }
            } catch (error) {
                applySwitchPosition(getDefaultSwitchPosition());
            }
        }

        function keepSwitchButtonInViewport() {
            const rect = switchTitle.getBoundingClientRect();
            const edgePosition = getSwitchEdgePosition(switchPosition || { left: rect.left, top: rect.top });

            applySwitchPosition(edgePosition);
            saveSwitchPosition(edgePosition);
        }

        function handleSwitchPointerDown(event) {
            if (event.button !== undefined && event.button !== 0) {
                return;
            }

            const rect = switchTitle.getBoundingClientRect();
            switchDragState = {
                pointerId: event.pointerId,
                startX: event.clientX,
                startY: event.clientY,
                startLeft: rect.left,
                startTop: rect.top,
                hasMoved: false
            };
            suppressNextSwitchClick = false;
            switchTitle.setPointerCapture(event.pointerId);
        }

        function handleSwitchPointerMove(event) {
            if (!switchDragState || switchDragState.pointerId !== event.pointerId) {
                return;
            }

            const deltaX = event.clientX - switchDragState.startX;
            const deltaY = event.clientY - switchDragState.startY;

            if (!switchDragState.hasMoved && Math.hypot(deltaX, deltaY) >= SWITCH_DRAG_THRESHOLD) {
                switchDragState.hasMoved = true;
            }

            if (switchDragState.hasMoved) {
                event.preventDefault();
                applySwitchPosition({
                    left: switchDragState.startLeft + deltaX,
                    top: switchDragState.startTop + deltaY
                });
            }
        }

        function handleSwitchPointerUp(event) {
            if (!switchDragState || switchDragState.pointerId !== event.pointerId) {
                return;
            }

            if (switchDragState.hasMoved) {
                event.preventDefault();
                suppressNextSwitchClick = true;
                animateSwitchToEdge(switchPosition);
            }

            switchTitle.releasePointerCapture(event.pointerId);
            switchDragState = null;
        }

        async function initVersions() {
            const response = await fetch('versions.json');
            const versions = await response.json();
            allVersions = versions;

            renderVersionButtons(versions);
            const requestedVersion = getRequestedVersion(versions);

            if (requestedVersion) {
                switchVersion(requestedVersion);
            } else {
                loadRandomVersion(versions);
            }

            restoreSwitchPosition();

            switchTitle.addEventListener('pointerdown', handleSwitchPointerDown);
            switchTitle.addEventListener('pointermove', handleSwitchPointerMove);
            switchTitle.addEventListener('pointerup', handleSwitchPointerUp);
            switchTitle.addEventListener('pointercancel', handleSwitchPointerUp);
            switchTitle.addEventListener('click', (event) => {
                if (suppressNextSwitchClick) {
                    event.preventDefault();
                    suppressNextSwitchClick = false;
                    return;
                }

                openVersionModal();
            });
        }

        versionClose.addEventListener('click', closeVersionModal);
        versionModal.addEventListener('click', (event) => {
            if (event.target === versionModal) {
                closeVersionModal();
            }
        });
        window.addEventListener('resize', keepSwitchButtonInViewport);
        initVersions();
    </script>
</body>
</html>
