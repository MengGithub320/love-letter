<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="一封充满爱心的代码情书">
    <title>💌 给你的代码情书</title>

    <!-- 微信分享meta标签 -->
    <meta property="og:title" content="💌 给你的代码情书">
    <meta property="og:description" content="编译通过，运行结果：永远爱你 💕">
    <meta property="og:image" content="https://mmbiz.qpic.cn/mmbiz_png/lC4pRubianpicD7GiciaibDvic8YQ/0">
    <meta property="og:url" content="">
    <meta property="og:type" content="website">

    <!-- 微信jssdk需要 -->
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #fff5f5;
        }

        #version-frame {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .switch-title {
            position: fixed;
            top: max(12px, env(safe-area-inset-top));
            right: 12px;
            z-index: 10;
            min-height: 40px;
            padding: 0 14px;
            border: 1px solid rgba(238, 90, 111, 0.28);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.88);
            color: #ee5a6f;
            font: 800 13px/1.2 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            box-shadow: 0 10px 28px rgba(238, 90, 111, 0.26);
            cursor: pointer;
            opacity: 0.9;
            backdrop-filter: blur(8px);
        }

        .version-modal {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(45, 19, 44, 0.42);
        }

        .version-modal.show {
            display: flex;
        }

        .version-dialog {
            width: min(320px, 100%);
            padding: 24px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
            text-align: center;
        }

        .version-dialog h2 {
            margin: 0 0 16px;
            color: #ee5a6f;
            font: 800 20px/1.3 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
        }

        .version-actions {
            display: grid;
            gap: 10px;
        }

        .version-option,
        .version-close {
            min-height: 42px;
            border: 0;
            border-radius: 999px;
            font: 700 14px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            cursor: pointer;
        }

        .version-option {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }

        .version-close {
            margin-top: 12px;
            background: #fff5f5;
            color: #ee5a6f;
        }
    </style>
</head>
<body>
    <button class="switch-title" id="switch-title" type="button">给你的代码情书</button>
    <iframe id="version-frame" title="给你的代码情书"></iframe>

    <div class="version-modal" id="version-modal" aria-hidden="true">
        <div class="version-dialog" role="dialog" aria-modal="true" aria-labelledby="version-modal-title">
            <h2 id="version-modal-title">切换版本</h2>
            <div class="version-actions" id="version-actions"></div>
            <button class="version-close" type="button" id="version-close">关闭</button>
        </div>
    </div>

    <script>
        const versionFrame = document.getElementById('version-frame');
        const switchTitle = document.getElementById('switch-title');
        const versionModal = document.getElementById('version-modal');
        const versionActions = document.getElementById('version-actions');
        const versionClose = document.getElementById('version-close');
        let titleClickCount = 0;

        function switchVersion(version) {
            versionFrame.src = version.file;
            closeVersionModal();
        }

        function renderVersionButtons(versions) {
            versionActions.innerHTML = '';

            versions.forEach((version) => {
                const button = document.createElement('button');
                button.className = 'version-option';
                button.type = 'button';
                button.textContent = version.name;
                button.addEventListener('click', () => switchVersion(version));
                versionActions.appendChild(button);
            });
        }

        function openVersionModal() {
            versionModal.classList.add('show');
            versionModal.setAttribute('aria-hidden', 'false');
            titleClickCount = 0;
        }

        function resetVersionModalState() {
            titleClickCount = 0;
        }

        function closeVersionModal() {
            versionModal.classList.remove('show');
            versionModal.setAttribute('aria-hidden', 'true');
            resetVersionModalState();
        }

        function loadRandomVersion(versions) {
            const randomIndex = Math.floor(Math.random() * versions.length);
            const selectedVersion = versions[randomIndex];
            switchVersion(selectedVersion);
        }

        async function initVersions() {
            const response = await fetch('versions.json');
            const versions = await response.json();

            renderVersionButtons(versions);
            loadRandomVersion(versions);

            switchTitle.addEventListener('click', () => {
                titleClickCount += 1;
                if (titleClickCount >= 4) {
                    openVersionModal();
                }
            });
        }

        versionClose.addEventListener('click', closeVersionModal);
        versionModal.addEventListener('click', (event) => {
            if (event.target === versionModal) {
                closeVersionModal();
            }
        });
        initVersions();
    </script>
</body>
</html>
